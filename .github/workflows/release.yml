name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.1.0)'
        required: true
        default: 'v1.1.0'
      release:
        description: 'Create GitHub Release?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: roguelike-linux-x64
            ext: ''
            musl: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: roguelike-windows-x64
            ext: '.exe'
            musl: false
          - os: macos-latest
            target: x86_64-apple-darwin
            name: roguelike-macos-x64
            ext: ''
            musl: false
          - os: macos-latest
            target: aarch64-apple-darwin
            name: roguelike-macos-arm64
            ext: ''
            musl: false

    steps:
      - name: Checkout game source
        uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && github.ref || 'claude/roguelike-rpg-game-LkUQp' }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: matrix.musl == true
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            roguelike-rpg/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('roguelike-rpg/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        working-directory: roguelike-rpg
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          src="roguelike-rpg/target/${{ matrix.target }}/release/roguelike-rpg${{ matrix.ext }}"
          dst="${{ matrix.name }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}${{ matrix.ext }}

      # ── Attach to GitHub Release ───────────────────────────────────
      - name: Upload to Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}${{ matrix.ext }}
          generate_release_notes: true

      - name: Upload to Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: ${{ matrix.name }}${{ matrix.ext }}
          generate_release_notes: false
          target_commitish: claude/roguelike-rpg-game-LkUQp
